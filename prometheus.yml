global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets:
          ['backend:3000', 'host.docker.internal:3000']
        labels:
          service: backend

  - job_name: 'postgres'
    static_configs:
      - targets: ['saas_ermeltech-postgres:9187']
        labels:
          service: postgres
