services:
  # 🐘 Banco de Dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: saas_ermeltech-postgres
    environment:
      POSTGRES_USER: ermeltech
      POSTGRES_PASSWORD: ermeltech123
      POSTGRES_DB: saas_ermeltech_db
    ports:
      - '5432:5432'
    volumes:
      # 💾 Persiste dados do banco
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ermeltech -d saas_ermeltech_db',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ermeltech-network

  # 🔙 Backend (Node.js + Express)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_ermeltech-backend
    environment:
      DATABASE_URL: postgresql://ermeltech:ermeltech123@postgres:5432/saas_ermeltech_db
      JWT_SECRET: sua_chave_secreta_super_segura_123456
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 📁 Monta pasta de uploads
      - ./public/uploads:/app/backend/public/uploads
    networks:
      - ermeltech-network

  # 🎨 Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_ermeltech-frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000/api/v1
    volumes:
      # 📁 Hot reload: mapeia pasta src para mudanças em tempo real
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - ermeltech-network

# 📊 Volumes persistentes
volumes:
  postgres_data:

# 🌐 Network para comunicação entre containers
networks:
  ermeltech-network:
    driver: bridge
