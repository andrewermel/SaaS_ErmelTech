services:
  # 🐘 Banco de Dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: saas_ermeltech-postgres
    environment:
      POSTGRES_USER: blacklanches
      POSTGRES_PASSWORD: blacklanches123
      POSTGRES_DB: blacklanches_db
    ports:
      - '5432:5432'
    volumes:
      # 💾 Persiste dados do banco
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U blacklanches -d blacklanches_db',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blacklanches-network

  # 🔙 Backend (Node.js + Express)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_ermeltech-backend
    environment:
      DATABASE_URL: postgresql://blacklanches:blacklanches123@postgres:5432/blacklanches_db
      JWT_SECRET: sua_chave_secreta_super_segura_123456
      PORT: 3000
      NODE_ENV: development
    ports:
      - '3001:3000'
      - '9229:9229'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 📁 Monta pasta de uploads
      - ./public/uploads:/app/backend/public/uploads
      # 📁 Monta código-fonte para hot reload
      - ./src:/app/backend/src
    networks:
      - blacklanches-network
    command: sh -c "sleep 10 && npx prisma migrate deploy && node --inspect=0.0.0.0:9229 --loader ts-node/esm src/index.ts"

  # 🎨 Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_ermeltech-frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000/api/v1
    volumes:
      # 📁 Hot reload: mapeia pasta src para mudanças em tempo real
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - blacklanches-network

  # 🧪 PostgreSQL dedicado para testes (porta 5433 no host)
  # Separado do banco de desenvolvimento para não contaminar dados
  postgres-test:
    image: postgres:16-alpine
    container_name: saas_ermeltech-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d test_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blacklanches-network

  # 📈 Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: saas_ermeltech-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - blacklanches-network

  # 📊 Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: saas_ermeltech-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - '3002:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - blacklanches-network

# 📊 Volumes persistentes
volumes:
  postgres_data:
  postgres_test_data:
  prometheus_data:
  grafana_data:

# 🌐 Network para comunicação entre containers
networks:
  blacklanches-network:
    driver: bridge
